name: Build Macy's AP China Grove Hex Utility

on:
  push:
    branches: [main]
    paths:
      - 'desktop_app.py'
      - 'tests/**'
      - 'src/assets/**'
      - 'requirements.txt'
      - 'Macys_AP_China_Grove_Hex_Utility.spec'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate source
        shell: pwsh
        run: |
          python -m py_compile desktop_app.py tests\desktop_app_smoke.py
          python tests\desktop_app_smoke.py
          python desktop_app.py --self-test

      - name: Build Windows executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean Macys_AP_China_Grove_Hex_Utility.spec
          $exe = 'dist\Macys_AP_China_Grove_Hex_Utility.exe'
          if (!(Test-Path $exe)) { throw "PyInstaller did not create $exe" }
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$hash  Macys_AP_China_Grove_Hex_Utility.exe" | Set-Content 'dist\Macys_AP_China_Grove_Hex_Utility.exe.sha256.txt' -Encoding ascii

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Macys_AP_China_Grove_Hex_Utility_Windows
          path: |
            dist/Macys_AP_China_Grove_Hex_Utility.exe
            dist/Macys_AP_China_Grove_Hex_Utility.exe.sha256.txt
          if-no-files-found: error
