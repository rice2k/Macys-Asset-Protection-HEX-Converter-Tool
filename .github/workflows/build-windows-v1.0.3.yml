name: Build AP HEX Converter Tool v1.0.3

on:
  pull_request:
    paths:
      - '.build/ap-hex-v1.0.3/**'
      - '.github/workflows/build-windows-v1.0.3.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reassemble AP HEX Converter Tool package
        shell: pwsh
        run: |
          $parts = Get-ChildItem '.build/ap-hex-v1.0.3/part*.b64' | Sort-Object Name
          if ($parts.Count -ne 3) { throw "Expected 3 package parts, found $($parts.Count)." }
          $base64 = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          $zip = 'AP_HEX_Converter_Tool_v1.0.3_Windows_Build_Package.zip'
          [IO.File]::WriteAllBytes($zip, [Convert]::FromBase64String($base64))
          $actual = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $expected = '1468bd77c2c285989e35c90343000a676a88d30b7dc59830fe60522de89a9ad5'
          if ($actual -ne $expected) { throw "Package checksum mismatch. Expected $expected, got $actual." }
          Expand-Archive $zip -DestinationPath 'package' -Force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install build dependencies
        shell: pwsh
        run: |
          $project = Get-ChildItem 'package' -Directory | Select-Object -First 1
          if (!$project) { throw 'Extracted project directory was not found.' }
          Set-Location $project.FullName
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build Windows executable
        shell: pwsh
        run: |
          $project = Get-ChildItem 'package' -Directory | Select-Object -First 1
          Set-Location $project.FullName
          python -m PyInstaller --noconfirm --clean AP_HEX_Converter_Tool.spec
          $target = Join-Path $PWD 'dist\AP_HEX_Converter_Tool_v1.0.3.exe'
          if (!(Test-Path $target)) { throw "PyInstaller did not create $target" }
          $hash = (Get-FileHash $target -Algorithm SHA256).Hash.ToLower()
          "$hash  AP_HEX_Converter_Tool_v1.0.3.exe" | Set-Content (Join-Path $PWD 'dist\AP_HEX_Converter_Tool_v1.0.3.exe.sha256.txt') -Encoding ascii

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: AP_HEX_Converter_Tool_v1.0.3_Windows
          path: |
            package/**/dist/AP_HEX_Converter_Tool_v1.0.3.exe
            package/**/dist/AP_HEX_Converter_Tool_v1.0.3.exe.sha256.txt
          if-no-files-found: error
          retention-days: 30
