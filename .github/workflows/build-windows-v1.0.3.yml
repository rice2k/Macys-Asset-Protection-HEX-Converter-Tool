name: Build Macy's AP Hex Utility v1.0.3

on:
  push:
    paths:
      - '.build/build-now.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.14.2 openpyxl==3.1.5 Pillow==11.2.1 reportlab==4.4.2 xlrd==2.0.2 tkinterdnd2==0.4.3 windnd==1.0.7

      - name: Build Windows executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean Macys_AP_China_Grove_Hex_Utility.spec
          $source = Join-Path $PWD 'dist\Macys_AP_China_Grove_Hex_Utility.exe'
          $target = Join-Path $PWD 'dist\Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe'
          if (!(Test-Path $source)) { throw "PyInstaller did not create $source" }
          Move-Item $source $target -Force
          $hash = (Get-FileHash $target -Algorithm SHA256).Hash.ToLower()
          "$hash  Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe" | Set-Content (Join-Path $PWD 'dist\Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe.sha256.txt') -Encoding ascii

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Macys_AP_China_Grove_Hex_Utility_v1.0.3_Windows
          path: |
            dist/Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe
            dist/Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe.sha256.txt
          if-no-files-found: error
          retention-days: 30
