name: Build AP HEX Converter Tool v1.0.3

on:
  push:
    branches: [main]
    paths:
      - 'desktop_app.py'
      - 'AP_HEX_Converter_Tool.spec'
      - '.github/workflows/build-windows-v1.0.3.yml'
      - '.build/build-now.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Clone source without marketplace actions
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "https://x-access-token:$env:GH_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
          git clone $repo source
          Set-Location source
          git checkout $env:GITHUB_SHA

      - name: Install dependencies and validate
        shell: pwsh
        run: |
          Set-Location source
          python --version
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.14.2 openpyxl==3.1.5 Pillow==11.2.1 reportlab==4.4.2 xlrd==2.0.2 tkinterdnd2==0.4.3 windnd==1.0.7
          python -m py_compile desktop_app.py
          if (!(Test-Path 'AP_HEX_Converter_Tool.spec')) { throw 'Build specification is missing.' }

      - name: Build AP HEX Converter Tool executable
        shell: pwsh
        run: |
          Set-Location source
          python -m PyInstaller --noconfirm --clean AP_HEX_Converter_Tool.spec
          $target = Join-Path $PWD 'dist\AP_HEX_Converter_Tool_v1.0.3.exe'
          if (!(Test-Path $target)) { throw "PyInstaller did not create $target" }
          $hash = (Get-FileHash $target -Algorithm SHA256).Hash.ToLower()
          "$hash  AP_HEX_Converter_Tool_v1.0.3.exe" | Set-Content (Join-Path $PWD 'dist\AP_HEX_Converter_Tool_v1.0.3.exe.sha256.txt') -Encoding ascii

      - name: Publish executable to build-output branch
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "https://x-access-token:$env:GH_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
          New-Item -ItemType Directory -Path publish | Out-Null
          Copy-Item 'source\dist\AP_HEX_Converter_Tool_v1.0.3.exe' 'publish\AP_HEX_Converter_Tool_v1.0.3.exe'
          Copy-Item 'source\dist\AP_HEX_Converter_Tool_v1.0.3.exe.sha256.txt' 'publish\AP_HEX_Converter_Tool_v1.0.3.exe.sha256.txt'
          Set-Location publish
          git init
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add origin $repo
          git add .
          git commit -m 'Publish AP HEX Converter Tool v1.0.3 Windows executable'
          git branch -M build-output-v1.0.3
          git push --force origin build-output-v1.0.3
