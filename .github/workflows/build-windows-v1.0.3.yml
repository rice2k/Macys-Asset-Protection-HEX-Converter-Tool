name: Build Macy's AP Hex Utility v1.0.3

on:
  push:
    paths:
      - '.build/build-now.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reassemble v1.0.3 build package
        shell: pwsh
        run: |
          $parts = Get-ChildItem '.build/v1.0.3/part*.b64' | Sort-Object Name
          if ($parts.Count -ne 9) { throw "Expected 9 package parts, found $($parts.Count)." }
          $base64 = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes('Macys_AP_China_Grove_Hex_Utility_v1.0.3_Windows_Build_Package.zip', [Convert]::FromBase64String($base64))
          $actual = (Get-FileHash 'Macys_AP_China_Grove_Hex_Utility_v1.0.3_Windows_Build_Package.zip' -Algorithm SHA256).Hash.ToLower()
          $expected = '2cc459de2802fff6bcf44ad1ddb06f85450dcdb5f6bec4ca674a081b7ce31adb'
          if ($actual -ne $expected) { throw "Package checksum mismatch. Expected $expected, got $actual." }
          Expand-Archive 'Macys_AP_China_Grove_Hex_Utility_v1.0.3_Windows_Build_Package.zip' -DestinationPath 'package' -Force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: 'package/**/requirements-build.txt'

      - name: Install build dependencies
        shell: pwsh
        run: |
          $project = Get-ChildItem 'package' -Directory | Select-Object -First 1
          Set-Location $project.FullName
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build Windows executable
        shell: pwsh
        run: |
          $project = Get-ChildItem 'package' -Directory | Select-Object -First 1
          Set-Location $project.FullName
          python -m PyInstaller --noconfirm --clean Macys_AP_China_Grove_Hex_Utility.spec
          $source = Join-Path $PWD 'dist\Macys_AP_China_Grove_Hex_Utility.exe'
          $target = Join-Path $PWD 'dist\Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe'
          if (!(Test-Path $source)) { throw "PyInstaller did not create $source" }
          Move-Item $source $target -Force
          $hash = (Get-FileHash $target -Algorithm SHA256).Hash.ToLower()
          "$hash  Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe" | Set-Content (Join-Path $PWD 'dist\Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe.sha256.txt') -Encoding ascii

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Macys_AP_China_Grove_Hex_Utility_v1.0.3_Windows
          path: |
            package/**/dist/Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe
            package/**/dist/Macys_AP_China_Grove_Hex_Utility_v1.0.3.exe.sha256.txt
          if-no-files-found: error
          retention-days: 30
