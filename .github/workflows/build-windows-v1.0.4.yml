name: Build AP HEX Converter Tool v1.0.4

on:
  pull_request:
    paths:
      - 'patches/v1.0.4/**'
      - 'tools/apply_v1_0_4_patch.py'
      - 'tools/generate_v1_0_4_assets.py'
      - 'AP_HEX_Converter_Tool_v1.0.4.spec'
      - '.github/workflows/build-windows-v1.0.4.yml'
  push:
    branches: [main]
    paths:
      - 'patches/v1.0.4/**'
      - 'tools/apply_v1_0_4_patch.py'
      - 'tools/generate_v1_0_4_assets.py'
      - 'AP_HEX_Converter_Tool_v1.0.4.spec'
      - '.github/workflows/build-windows-v1.0.4.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.14.2 openpyxl==3.1.5 Pillow==11.2.1 reportlab==4.4.2 xlrd==2.0.2 tkinterdnd2==0.4.3 windnd==1.0.7

      - name: Apply and validate v1.0.4
        shell: pwsh
        run: |
          python tools/apply_v1_0_4_patch.py
          python tools/generate_v1_0_4_assets.py
          python -m py_compile desktop_app.py
          python desktop_app.py --self-test

      - name: Build Windows executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean AP_HEX_Converter_Tool_v1.0.4.spec
          $exe = 'dist\AP_HEX_Converter_Tool_v1.0.4.exe'
          if (!(Test-Path $exe)) { throw "PyInstaller did not create $exe" }
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$hash  AP_HEX_Converter_Tool_v1.0.4.exe" | Set-Content 'dist\AP_HEX_Converter_Tool_v1.0.4.exe.sha256.txt' -Encoding ascii
          Compress-Archive -Path $exe,'dist\AP_HEX_Converter_Tool_v1.0.4.exe.sha256.txt' -DestinationPath 'dist\AP_HEX_Converter_Tool_v1.0.4_Windows.zip' -Force

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: AP_HEX_Converter_Tool_v1.0.4_Windows
          path: |
            dist/AP_HEX_Converter_Tool_v1.0.4.exe
            dist/AP_HEX_Converter_Tool_v1.0.4.exe.sha256.txt
            dist/AP_HEX_Converter_Tool_v1.0.4_Windows.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish download branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Path publish | Out-Null
          Copy-Item 'dist\AP_HEX_Converter_Tool_v1.0.4.exe' publish
          Copy-Item 'dist\AP_HEX_Converter_Tool_v1.0.4.exe.sha256.txt' publish
          Copy-Item 'dist\AP_HEX_Converter_Tool_v1.0.4_Windows.zip' publish
          Set-Location publish
          git init
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add origin "https://x-access-token:$env:GH_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
          git add .
          git commit -m 'Publish AP HEX Converter Tool v1.0.4 Windows build'
          git branch -M build-output-v1.0.4
          git push --force origin build-output-v1.0.4
